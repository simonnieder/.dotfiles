################
### MONITORS ###
###############

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-A-1,1920x1080@60,-1920x0,1
monitor=eDP-1,1920x1200,0x0,1.2
#monitor=eDP-1,disable

source = colors.conf
# left
#monitor=mirror,eDP-1
#monitor=HDMI-A-1,mirror,eDP-1,1920x1080,preferred,1

###################
### MY PROGRAMS ###
###################

xwayland{
	force_zero_scaling = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$notes = logseq
$mail = Telegram
$terminal = kitty
$browser = zen-browser
$fileManager = nautilus
$menu = rofi -show drun

# themes
env = QT_QPA_PLATFORM,xcb
env = QT_QPA_PLATFORMTHEME,qt6ct

bindl = , switch:on:Lid Switch, exec, loginctl lock-session && systemctl suspend-then-hibernate
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

#for libadwaita gtk4 apps you can use this command:
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"
exec-once = hyprsunset

#for gtk3 apps you need to install adw-gtk3 theme (in arch linux sudo pacman -S adw-gtk-theme)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = nm-applet & blueman-applet
exec-once = waybar & hyprpaper & hypridle
#exec-once = QT_QPA_PLATFORM=wayland qs -c noctalia-shell
exec-once = dunst

exec-once = ~/.config/hypr/resize.sh

#############################
### WORKSPACES ###
#############################
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1,
workspace = 3, monitor:HDMI-A-1, default:true

exec-once=[workspace 1 silent] $terminal 
exec-once=[workspace 2 silent] $browser

#workspace = 1, on-created-empty: $terminal
#workspace = 2, on-created-empty: firefox

workspace = special:notes
workspace = special:music, on-created-empty: spotify
workspace = special:console, on-created-empty: $terminal
workspace = special:mail, on-created-empty: $mail
workspace = 3, monitor:HDMI-A-1

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################


# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 2 #5
    gaps_out = 2, 4 4, 4 # 5,10,10,10

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(D49893BB)
	#col.inactive_border = rgba(595959aa)
	col.active_border = $outline
    col.inactive_border = $background #rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true 
    resize_corner = 1
    extend_border_grab_area = 10

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

group {
    col.border_active = rgba(D49893BB)

    col.border_inactive = $on_error  # rgba(595959aa)

    groupbar {
        font_family = JetBrains Mono NF
        #height = 20
        #font_size = 10
        col.active = rgba(00000033)
        col.inactive = rgba(D4989300)
    }
}
    
# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 18

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.96

    #drop_shadow = true
    #shadow_range = 4
    #shadow_render_power = 3
    #col.shadow = rgba(1a1a1aee)
	shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $background
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 1
        passes = 3
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 1.94, almostLinear, fade
    animation = workspacesIn, 0, 1.21, almostLinear, fade
    animation = workspacesOut, 0, 1.94, almostLinear, fade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1

    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    	disable_while_typing = false
    	tap-to-click = true
		scroll_factor = 0.4
    }

}

device{
	name = "elan06fa:00-04f3:327e-touchpad"
	sensitivity = -1
}


# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = true
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier


bind = $mainMod Shift, B, exec, ~/.config/waybar/restart_waybar.sh

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, X, exec, voxtype record toggle
bind = $mainMod, F, fullscreen
#bind = $mainMod Shift, P, exec, grim -g "$(slurp -w 0)" - | swappy -f -

bind = $mainMod Shift, P, exec, grim -g "$(slurp -w 0 2>/dev/null)" - | satty --filename - --output-filename "~/images/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png"  --early-exit  --actions-on-enter save-to-clipboard --copy-command 'wl-copy'

bind = $mainMod Shift, Q, killactive,
bind = $mainMod Shift, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
#bind = $mainMod, D, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod Shift, L, exec, hyprlock 
bind = $mainMod Shift, H, exec, systemctl hibernate 
bind = $mainMod, P, pseudo, #dwindle
#bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# prev workspace
bind = $mainMod, TAB,workspace,previous
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

$closespecial = hyprctl monitors -j | jq -r '.[] | select(.focused == true) | .specialWorkspace.name' | sed 's/special://' | xargs -I [] hyprctl dispatch togglespecialworkspace []

bind = $mainMod, 1, exec, $closespecial
bind = $mainMod, 2, exec, $closespecial
bind = $mainMod, 3, exec, $closespecial
bind = $mainMod, 4, exec, $closespecial
bind = $mainMod, 5, exec, $closespecial
bind = $mainMod, 6, exec, $closespecial
bind = $mainMod, 7, exec, $closespecial
bind = $mainMod, 8, exec, $closespecial
bind = $mainMod, 9, exec, $closespecial

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# groups
bind = $mainMod, T, togglegroup
bind = $mainMod SHIFT, left, changegroupactive, b
bind = $mainMod SHIFT, right, changegroupactive, f

# Example special workspace (spotify)
bind = $mainMod, S, togglespecialworkspace, music

bind = $mainMod, C, togglespecialworkspace, console

#Mail
bind = $mainMod, M, togglespecialworkspace, mail

# Example special workspace (notes)
bind = $mainMod, N, togglespecialworkspace, notes
bind = $mainMod SHIFT, N, movetoworkspace, special:notes
bind = $mainMod, A, togglespecialworkspace, notes
bind = $mainMod SHIFT, A, movetoworkspace, special:notes

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media buttons
bindle = ,XF86AudioMute, exec, pamixer -t

bindle = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindle = ,XF86AudioRaiseVolume, exec, pamixer -i 5

bindle=, XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindle=, XF86MonBrightnessDown, exec, brightnessctl set 10%-

#bind = $mainMod,c , exec, nmcli networking off && nmcli networking on

# ----------------------------------------------------- 
# Window rules
# ----------------------------------------------------- 

windowrule { 
	name = nautilus
	match:class = org.gnome.Nautilus
	size = monitor_w*0.8 monitor_h*0.8
	center = true
	float = true
}

windowrule { 
	name = spotify
	match:class = Spotify
	size = monitor_w*0.85 monitor_h*0.85
	center = true
	pseudo = true
	rounding = 20
}

windowrule { 
	name = telegram
	match:class = TelegramDesktop
	size = monitor_w*0.5 monitor_h
	center = true
	pseudo = true
	rounding = 20
}

# Float Rules
windowrule = match:class org.pulseaudio.pavucontrol, float true
windowrule = match:class blueman-manager, float true
windowrule = match:class nm-connection-editor, float true
windowrule = match:class xdg-desktop-portal-gtk, float true
windowrule = match:class Progress, float true
windowrule = match:class com.gabm.satty, float true
windowrule = match:class localsend, float true
windowrule = match:class org.gnome.Loupe, float true
windowrule = match:workspace special:console, size monitor_w*0.75 monitor_h*0.9
windowrule = match:workspace special:console, pseudo true
windowrule = match:class (jetbrains-)(.*), match:float true, no_initial_focus true
