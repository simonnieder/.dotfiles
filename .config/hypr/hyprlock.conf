source = colors.conf
$accent = $mauve
$accentAlpha = $mauveAlpha
$font = JetBrainsMono Nerd Font
$text = rgba(251,241,199,1)
$text-light = rgba(251,241,199,0.5)

# GENERAL
general {
  disable_loading_bar = true
  hide_cursor = true
  no_fade_out = true
}

# BACKGROUND
background {
  monitor =
  #path = $HOME/dotfiles/wallpapers/a_city_skyline_with_a_sunset_in_the_background.png
  blur_passes = 2
  color = $surface
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(0, 0, 0, 0)
  inner_color = $surface_container # rgba(0, 0, 0, 0.4)
  font_color = $text
  fade_on_empty = true
  hide_input = false
  placeholder_text =
  check_color = $accent
  fail_color = $error
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -75
  halign = center
  valign = center 
}

